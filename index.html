<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUPERELLIPSE</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

    /* KaTeX for mathematical formulas */
    @import url('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css');

    :root {
      --bg-color: #e4ebf5;
      --shadow-light: #ffffff;
      --shadow-dark: #c8d0e7;
      --text-main: #505d76;
      --text-dark: #2d3748;
      --accent: #ff735c;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      display: flex;
      gap: 3rem;
      background: var(--bg-color);
      padding: 2.5rem;
      border-radius: 30px;
      box-shadow: 12px 12px 24px var(--shadow-dark),
        -12px -12px 24px var(--shadow-light);
      flex-wrap: wrap;
      justify-content: center;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 300px;
    }

    h1 {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: var(--bg-color);
      padding: 1.25rem;
      border-radius: 20px;
      box-shadow: 6px 6px 12px var(--shadow-dark),
        -6px -6px 12px var(--shadow-light);
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .value-display {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    /* Range Slider - Neomorphic */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      margin: 12px 0;
    }

    input[type=range]:focus {
      outline: none;
    }

    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 8px;
      cursor: pointer;
      background: var(--bg-color);
      border-radius: 10px;
      box-shadow: inset 3px 3px 6px var(--shadow-dark),
        inset -3px -3px 6px var(--shadow-light);
    }

    input[type=range]::-webkit-slider-thumb {
      box-shadow: 4px 4px 8px var(--shadow-dark),
        -4px -4px 8px var(--shadow-light);
      border: 4px solid var(--bg-color);
      height: 24px;
      width: 24px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      -webkit-appearance: none;
      margin-top: -8px;
    }

    input[type=range]:focus::-webkit-slider-thumb {
      background: #ff5b40;
    }

    /* Width Slider - Blue */
    #aSlider::-webkit-slider-thumb {
      background: #4facfe;
    }

    #aSlider:focus::-webkit-slider-thumb {
      background: #00f2fe;
    }

    /* Height Slider - Green */
    #bSlider::-webkit-slider-thumb {
      background: #43e97b;
    }

    #bSlider:focus::-webkit-slider-thumb {
      background: #38f9d7;
    }

    /* Number Input - Neomorphic Inset */
    .number-input {
      width: 100%;
      background: var(--bg-color);
      border: none;
      color: var(--text-dark);
      padding: 0.7rem;
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      box-sizing: border-box;
      margin-top: 0.25rem;
      box-shadow: inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .number-input:focus {
      outline: none;
      box-shadow: inset 6px 6px 12px var(--shadow-dark),
        inset -6px -6px 12px var(--shadow-light);
    }

    #canvas-container {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      border-radius: 66px;
      padding: 1.5rem;
      box-shadow: 10px 10px 20px var(--shadow-dark),
        -10px -10px 20px var(--shadow-light);
    }

    canvas {
      border-radius: 50px;
      box-shadow: 6px 6px 12px var(--shadow-dark),
        -6px -6px 12px var(--shadow-light);
    }

    .equation-box {
      background: var(--bg-color);
      padding: 1rem 3rem;
      border-radius: 20px;
      box-shadow: 8px 8px 16px var(--shadow-dark),
        -8px -8px 16px var(--shadow-light);
      margin-bottom: 2.5rem;
      color: var(--text-dark);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .download-btn {
      margin-top: 2.5rem;
      padding: 1rem 2.5rem;
      background: var(--bg-color);
      border: none;
      border-radius: 15px;
      color: var(--text-dark);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 8px 8px 16px var(--shadow-dark),
        -8px -8px 16px var(--shadow-light);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .download-btn:hover {
      color: var(--accent);
      box-shadow: 4px 4px 8px var(--shadow-dark),
        -4px -4px 8px var(--shadow-light);
    }

    .download-btn:active {
      box-shadow: inset 4px 4px 8px var(--shadow-dark),
        inset -4px -4px 8px var(--shadow-light);
    }

    /* Adjust KaTeX font size */
    .equation-box .katex {
      font-size: 1.4em;
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body);"></script>
</head>

<body>

  <div class="equation-box">
    $$ \left| \frac{x}{a} \right|^n + \left| \frac{y}{b} \right|^n = 1 $$
  </div>

  <div class="container">
    <div class="controls">
      <h1>SUPERELLIPSE</h1>

      <div class="control-group">
        <label for="nSlider">Parameter n: <span id="nValue" class="value-display">2.9</span></label>
        <input type="range" id="nSlider" min="0.1" max="10" step="0.1" value="2.9">
        <input type="number" id="nInput" min="0.1" max="10" step="0.1" value="2.9" class="number-input">
      </div>

      <div class="control-group">
        <label for="aSlider">Width (a): <span id="aValue" class="value-display">256</span></label>
        <input type="range" id="aSlider" min="10" max="256" step="1" value="256">
        <input type="number" id="aInput" min="10" max="256" step="1" value="256" class="number-input">
      </div>

      <div class="control-group">
        <label for="bSlider">Height (b): <span id="bValue" class="value-display">256</span></label>
        <input type="range" id="bSlider" min="10" max="256" step="1" value="256">
        <input type="number" id="bInput" min="10" max="256" step="1" value="256" class="number-input">
      </div>

    </div>

    <div id="canvas-container"></div>
  </div>

  <button id="downloadBtn" class="download-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <polyline points="7 10 12 15 17 10"></polyline>
      <line x1="12" y1="15" x2="12" y2="3"></line>
    </svg>
    Download as .svg
  </button>

  <script src="sketch.js"></script>
</body>

</html>
